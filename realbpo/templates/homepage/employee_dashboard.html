{% extends "homepage/base.html" %}

{% block body %}
<section class="section-card">
    <p class="eyebrow">Employee Dashboard</p>
    <h1>Welcome, {{ request.user.username }}</h1>
    <p class="section-copy">Owner: {{ owner.username }}</p>
</section>

<section class="section-card">
    <div class="section-header">
        <h2>Your Projects</h2>
    </div>
    <div class="item-list">
        {% for project in projects %}
            <div class="list-card">
                <div>
                    <h3>{{ project.name }}</h3>
                </div>
                <div class="action-row compact">
                    <a href="{% url 'view_project' project.id %}">View</a>
                    <a href="{% url 'update_project' project.id %}">Edit</a>
                </div>
            </div>
        {% empty %}
            <p class="empty-state">No projects yet.</p>
        {% endfor %}
    </div>
</section>
{% endblock body %}
