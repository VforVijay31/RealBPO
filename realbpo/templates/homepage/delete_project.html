{% extends "homepage/base.html" %}
{% block body %}
<section class="form-card confirm-card">
    <p class="eyebrow">Delete Project</p>
    <h1>{{ project.name }}</h1>
    <p class="section-copy">Are you sure you want to delete this project? This action cannot be undone.</p>
    <form method="POST" class="action-row">
        {% csrf_token %}
        <button type="submit" class="primary-button danger-button">Yes, Delete</button>
        <a href="{% url 'project_list' %}" class="button-link button-link-secondary">Cancel</a>
    </form>
</section>
{% endblock body %}
