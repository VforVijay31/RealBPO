{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RealBPO</title>
    <link rel="stylesheet" href="{% static 'css/site.css' %}">
</head>
<body>
    <div class="page-shell">
        <header class="site-header">
            <nav class="site-nav">
                {% if user.is_authenticated %}
                    <a href="{% url 'dashboard' %}">Dashboard</a>
                    <a href="{% url 'project_list' %}">Projects</a>
                    <form action="{% url 'logout' %}" method="post" class="inline-form">
                        {% csrf_token %}
                        <button type="submit" class="nav-button">Logout</button>
                    </form>
                {% else %}
                    <a href="{% url 'home' %}">Home</a>
                    <a href="{% url 'owner_login' %}">Owner Login</a>
                    <a href="{% url 'employee_login' %}">Employee Login</a>
                    <a href="{% url 'register_user' %}" class="nav-accent">Sign Up</a>
                {% endif %}
            </nav>
        </header>

        <main class="page-content">
            {% if messages %}
                <section class="message-stack">
                    {% for message in messages %}
                        <div class="message {{ message.tags }}">{{ message }}</div>
                    {% endfor %}
                </section>
            {% endif %}

            {% block body %}
            {% endblock body %}
        </main>
    </div>
</body>
</html>
